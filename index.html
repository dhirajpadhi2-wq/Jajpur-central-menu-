<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jajpur Central | Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg,#111,#1c1c1c);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:25px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

header h1{
color:#00d4ff;
font-size:34px;
}

/* SEARCH */

#search{
width:90%;
margin:15px auto;
display:block;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

/* CATEGORY */

.category{
margin:30px;
padding:20px;
background:#1a1a1a;
border-radius:15px;
}

.category h2{
color:#00d4ff;
margin-bottom:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
}

/* BUTTON */

.btn{
display:block;
text-align:center;
margin:20px auto;
padding:15px;
width:85%;
background:#00d4ff;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
}

</style>

</head>

<body>

<header>
<h1>Jajpur Central</h1>
<p>Delicious Food | Odisha</p>
</header>

<input type="text" id="search" placeholder="Search food...">

<section>

<div class="category">
<h2>🔥 Popular Items</h2>
<div class="item"><span>Chicken Biryani</span><span>₹120</span></div>
<div class="item"><span>Paneer Butter Masala</span><span>₹130</span></div>
<div class="item"><span>Egg Roll</span><span>₹50</span></div>
</div>

</section>

<a class="btn" href="https://wa.me/919040301154">Order on WhatsApp</a>
<a class="btn" href="tel:9040301154">Call Now</a>

<footer>
<p>© 2026 Jajpur Central</p>
</footer>

<script>
document.getElementById("search").addEventListener("keyup", function(){
let value=this.value.toLowerCase();
let items=document.querySelectorAll(".item");

items.forEach(function(item){
if(item.innerText.toLowerCase().includes(value)){
item.style.display="flex";
}else{
item.style.display="none";
}
});
});
</script>

</body>
</html>
